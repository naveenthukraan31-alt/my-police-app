<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Case Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020912;--s1:#060f1e;--s2:#0a1628;--s3:#0f1f38;--s4:#162845;
  --border:#1a3050;--bl:#2a4a75;
  --gold:#d4a017;--gold2:#f0be30;--gd:rgba(212,160,23,.12);
  --red:#e74c3c;--rd:rgba(231,76,60,.15);
  --orange:#e67e22;--od:rgba(230,126,34,.15);
  --green:#2ecc71;--gnd:rgba(46,204,113,.12);
  --blue:#3498db;--bld:rgba(52,152,219,.12);
  --purple:#9b59b6;--pd:rgba(155,89,182,.12);
  --text:#c8d8ee;--t2:#7a96b8;--t3:#3d5470;--white:#eaf0fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}

.topbar{background:var(--s1);border-bottom:2px solid var(--gold);padding:0 14px;display:flex;align-items:center;flex-shrink:0;min-height:56px;box-shadow:0 2px 20px rgba(0,0,0,.6);z-index:100;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;position:relative;}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#040a14;}
.brand-text h1{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--white);letter-spacing:2px;text-transform:uppercase;line-height:1.2;}
.brand-text p{font-size:8px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;}
.brand-dropdown{display:none;position:absolute;top:52px;left:0;background:var(--s2);border:1px solid var(--border);border-radius:8px;min-width:200px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.brand-dropdown.open{display:block;}
.brand-dd-item{padding:12px 16px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px;transition:all .15s;border-radius:8px;}
.brand-dd-item:hover{background:var(--s3);color:var(--gold);}
.brand-dd-item.active{color:var(--gold);}
.brand-dd-divider{height:1px;background:var(--border);margin:4px 0;}
.brand-dd-ps{padding:8px 16px 4px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);font-family:'Barlow Condensed',sans-serif;}
.brand-dd-ps-item{padding:10px 16px;cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:space-between;border-radius:8px;}
.brand-dd-ps-item:hover{background:var(--s3);color:var(--white);}
.brand-dd-ps-item.cur{color:var(--green);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn-add{background:var(--gold);color:#040a14;border:none;padding:9px 16px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s;}
.btn-add:hover{background:var(--gold2);}

.stats-row{display:grid;gap:6px;padding:8px 14px 0;flex-shrink:0;}
.stats-row.s4{grid-template-columns:repeat(4,1fr);}
.stats-row.s3{grid-template-columns:repeat(3,1fr);}
.scard{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.scard:hover{border-color:var(--bl);}
.scard-n{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;}
.scard-l{font-size:7px;color:var(--t2);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
.scard.sp .scard-n{color:var(--red);}
.scard.sp.active{border-color:var(--red);background:rgba(231,76,60,.08);}
.scard.sa .scard-n{color:var(--gold);}
.scard.sa.active{border-color:var(--gold);background:var(--gd);}
.scard.sc .scard-n{color:var(--green);}
.scard.sc.active{border-color:var(--green);background:var(--gnd);}
.scard.st .scard-n{color:var(--white);}
.scard.st.active{border-color:var(--bl);}
.scard.si .scard-n{color:var(--orange);}
.scard.si.active{border-color:var(--orange);background:var(--od);}
.scard.sd .scard-n{color:var(--purple);}
.scard.sd.active{border-color:var(--purple);background:var(--pd);}

.search-wrap{padding:8px 14px;flex-shrink:0;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-box{position:relative;flex:1;}
.search-box input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 12px 10px 36px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--gold);}
.search-box input::placeholder{color:var(--t3);}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:15px;pointer-events:none;}
.search-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;display:none;padding:0;}
.search-clr.on{display:block;}
.btn-refresh{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:10px 12px;border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s;flex-shrink:0;}
.btn-refresh:hover{border-color:var(--gold);color:var(--gold);}

.content{flex:1;overflow-y:auto;padding:10px 14px 14px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--border);}

.loading{text-align:center;padding:60px 20px;color:var(--t2);}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

.badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid;}
.b-ui{background:var(--gd);color:var(--gold);border-color:rgba(212,160,23,.4);}
.b-cs{background:var(--gnd);color:var(--green);border-color:rgba(46,204,113,.35);}
.b-jc{background:rgba(231,76,60,.2);color:#ff6b6b;border-color:rgba(231,76,60,.5);}
.b-un{background:rgba(80,80,80,.15);color:#aaa;border-color:rgba(80,80,80,.3);}
.b-cancel{background:var(--pd);color:#c39bd3;border-color:rgba(155,89,182,.4);}
.b-ov{background:var(--rd);color:var(--red);border-color:rgba(231,76,60,.4);}
.b-dep{background:var(--pd);color:#c39bd3;border-color:rgba(155,89,182,.4);}
.b-mhcr{background:rgba(155,89,182,.2);color:#c39bd3;border-color:rgba(155,89,182,.4);}

.rdot{width:9px;height:9px;background:var(--red);border-radius:50%;display:inline-block;flex-shrink:0;box-shadow:0 0 7px var(--red);animation:rp 1.4s infinite;}
@keyframes rp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);}}

.ccard{background:var(--s2);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.ccard.c-jc{border-left-color:var(--red);}
.ccard.c-pin{border-left-color:var(--red);}
.ccard.c-ui{border-left-color:var(--orange);}
.ccard.c-cs{border-left-color:var(--green);}
.ccard.c-un{border-left-color:var(--t3);}
.ccard.c-cancel{border-left-color:var(--purple);}
.ccard.c-mhcr{border-left-color:var(--purple);}

.icard{background:var(--s2);border:1px solid var(--border);border-left:4px solid var(--orange);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.icard.dep{border-left-color:var(--purple);}

.ccard-top,.icard-top{padding:12px 14px 10px;cursor:pointer;user-select:none;}
.ccard-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ccard-fir{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--gold);display:flex;align-items:center;gap:7px;}
.ccard-r1-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.arr-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--s3);border-radius:50%;color:var(--t2);font-size:13px;transition:transform .25s,background .15s;flex-shrink:0;}
.ccard.open .arr-btn,.icard.open .arr-btn{transform:rotate(180deg);background:var(--gold);color:#040a14;}

.icard-ddno{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--orange);}
.icard-date{font-size:13px;color:var(--white);font-weight:600;}
.icard-deceased{font-size:14px;color:var(--white);font-weight:600;margin-top:4px;}
.icard-detail{font-size:12px;color:var(--t2);margin-top:2px;}

.ccard-det,.icard-det{display:none;border-top:1px solid var(--border);}
.ccard.open .ccard-det,.icard.open .icard-det{display:block;}
.det-sec{margin:10px 12px;background:var(--s3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.det-sec:last-child{margin-bottom:12px;}
.det-sec-hdr{padding:10px 14px;background:var(--s4);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.det-body{padding:12px 14px;}
.det-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:3px;}

.act-btns{display:flex;gap:7px;flex-wrap:wrap;padding:10px 14px;background:var(--s3);border-bottom:1px solid var(--border);}
.dbtn{display:inline-flex;align-items:center;gap:5px;background:var(--bld);border:1px solid rgba(52,152,219,.35);color:var(--blue);padding:6px 11px;border-radius:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .15s;}
.pbtn{display:inline-flex;align-items:center;background:var(--gd);border:1px solid rgba(212,160,23,.35);color:var(--gold);padding:6px 11px;border-radius:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.ebtn{display:inline-flex;align-items:center;background:var(--bld);border:1px solid rgba(52,152,219,.35);color:var(--blue);padding:6px 11px;border-radius:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.rbtn{display:inline-flex;align-items:center;background:var(--rd);border:1px solid rgba(231,76,60,.35);color:var(--red);padding:6px 11px;border-radius:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.depbtn{display:inline-flex;align-items:center;background:var(--pd);border:1px solid rgba(155,89,182,.35);color:#c39bd3;padding:6px 11px;border-radius:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}

.comp-box{display:flex;gap:10px;align-items:flex-start;}
.comp-photo{width:44px;height:44px;background:var(--s4);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.acc-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.acc-item:last-child{margin-bottom:0;}
.acc-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.acc-photo{width:44px;height:44px;background:var(--s4);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.acc-info{flex:1;min-width:0;}
.acc-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.acc-nm{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--white);}
.acc-fn{font-size:13px;color:var(--white);margin-top:2px;font-weight:500;}
.acc-bdgs{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}

.cd-alert{background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.3);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;}
.cd-alert-msg{font-size:13px;color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:600;line-height:1.4;}
.timeline{position:relative;padding-left:14px;}
.timeline::before{content:'';position:absolute;left:3px;top:6px;bottom:6px;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:14px;}
.tl-item:last-child{margin-bottom:0;}
.tl-dot{width:9px;height:9px;border-radius:50%;position:absolute;left:-7px;top:4px;border:2px solid var(--s1);background:var(--gold);}
.cd-entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.tl-date{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--gold2);}
.tl-text{font-size:13px;color:var(--white);line-height:1.6;background:var(--s2);padding:9px 11px;border-radius:6px;border-left:2px solid var(--gold);word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;}
.tl-rem{font-size:11px;color:var(--t2);margin-top:4px;}
.btn-cd{width:100%;background:none;border:1px dashed var(--bl);color:var(--t2);padding:9px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .15s;}
.btn-cd:hover{border-color:var(--gold);color:var(--gold);}

.empty{text-align:center;padding:50px 20px;color:var(--t2);}
.empty-i{font-size:38px;margin-bottom:12px;opacity:.4;}
.empty p{font-size:12px;letter-spacing:.8px;}
.err-box{background:var(--rd);border:1px solid rgba(231,76,60,.3);border-radius:7px;padding:13px 15px;color:var(--red);font-size:12px;margin-bottom:14px;line-height:1.6;}

.overlay{display:none;position:fixed;inset:0;background:rgba(2,6,16,.92);z-index:300;align-items:flex-start;justify-content:center;overflow-y:auto;padding:14px;backdrop-filter:blur(6px);}
.overlay.on{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bl);border-top:2px solid var(--gold);border-radius:12px;width:100%;max-width:600px;animation:mup .18s ease;margin:auto;}
@keyframes mup{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--s1);z-index:2;border-radius:12px 12px 0 0;}
.mhdr h2{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.mclose{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;line-height:1;}
.mclose:hover{color:var(--red);}
.mbody{padding:16px;}
.fsec{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--border);padding-bottom:4px;margin:14px 0 10px;}
.fsec:first-child{margin-top:0;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--s3);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg input::placeholder,.fg textarea::placeholder{color:var(--t3);}
.fg textarea{resize:vertical;min-height:58px;}
.fg select option{background:var(--s2);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bsave{width:100%;background:var(--gold);color:#040a14;border:none;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:6px;margin-top:10px;transition:background .2s;}
.bsave:hover:not(:disabled){background:var(--gold2);}
.bsave:disabled{opacity:.6;cursor:not-allowed;}
.bacc{width:100%;background:none;border:1px dashed var(--bl);color:var(--t2);padding:8px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;transition:all .15s;}
.bacc:hover{border-color:var(--gold);color:var(--gold);}
.acc-blk{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;}
.acc-blk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.acc-blk-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
.bremacc{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:0;}
.bremacc:hover{color:var(--red);}

.ps-item{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer;}
.ps-item:last-child{border-bottom:none;}
.ps-item:hover{background:var(--s3);}
.ps-name{font-size:14px;color:var(--white);font-weight:600;}
.ps-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.ps-cur{font-size:10px;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.ps-view{font-size:10px;color:var(--t2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;}
.ps-view:hover{color:var(--gold);}
.readonly-banner{background:rgba(155,89,182,.15);border:1px solid rgba(155,89,182,.3);border-radius:6px;padding:8px 14px;margin:8px 14px 0;font-size:11px;color:#c39bd3;font-family:'Barlow Condensed',sans-serif;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.readonly-banner button{background:none;border:1px solid rgba(155,89,182,.4);color:#c39bd3;padding:4px 10px;border-radius:4px;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#040a14;padding:10px 20px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;z-index:500;display:none;white-space:nowrap;box-shadow:0 4px 24px rgba(46,204,113,.4);}
.toast.on{display:block;animation:mup .2s ease;}
.toast.err{background:var(--red);}

@media(max-width:400px){.fr2{grid-template-columns:1fr;}.acc-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="toggleBrandDD()">
    <div class="brand-icon">DP</div>
    <div class="brand-text">
      <h1 id="topbar-title">Case Tracker</h1>
      <p id="topbar-ps">PS Bhajanpura</p>
    </div>
    <div class="brand-dropdown" id="brandDD">
      <div class="brand-dd-item active" id="dd-cases" onclick="switchModule('cases');event.stopPropagation()">📋 Case Tracker</div>
      <div class="brand-dd-item" id="dd-inquest" onclick="switchModule('inquest');event.stopPropagation()">📝 Inquest Tracker</div>
      <div class="brand-dd-divider"></div>
      <div class="brand-dd-ps">Police Station</div>
      <div id="dd-ps-list"></div>
      <div class="brand-dd-item" style="color:var(--blue);font-size:11px;" onclick="openPSModal();event.stopPropagation()">⚙ Manage Stations</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-add" id="btn-add-main" onclick="handleAddBtn()">+ Add Case</button>

// ══ PIN ══
async function loadPinned(){try{const snap=await getDocs(collection(db,'pinned'));pinnedIds=snap.docs.map(d=>d.data().key).filter(Boolean);}catch(e){pinnedIds=[];}}
async function addPin(key){try{await addDoc(collection(db,'pinned'),{key,createdAt:new Date().toISOString()});pinnedIds.push(key);}catch(e){}}
async function removePin(key){try{const snap=await getDocs(collection(db,'pinned'));const toDelete=snap.docs.find(d=>d.data().key===key);if(toDelete)await deleteDoc(doc(db,'pinned',toDelete.id));pinnedIds=pinnedIds.filter(k=>k!==key);}catch(e){}}

window.loadData=async function(){
  showLoading();

    if(curModule==='cases'){
      const [casesSnap,accSnap,cdSnap,pinnedSnap]=await Promise.all([
        getDocs(collection(db,psCollName('cases'))),

        getDocs(collection(db,psCollName('caseDiary'))),
        getDocs(collection(db,'pinned'))
      ]);
      allCases=casesSnap.docs.map(d=>({id:d.id,...d.data()}));

};

// ══ HELPERS ══
// UPDATED: isCS now includes HANDOVER TO MHCR and custom statuses that are CS-like
function isCS(st){
  const s=(st||'').toLowerCase();
  return ['chargesheeted','cancellation','quashed','untrace','untraced','false report','closure','handover to mhcr'].some(k=>s.includes(k));
}
function isJC(caseId){return allAccused.some(a=>a.caseId===caseId&&(a.custodyStatus||'').toLowerCase().includes('jc'));}
function parseRegDate(c){const d=c.dateOfReg||'';if(!d)return new Date(0);const p=d.split('-');return p.length===3?(p[0].length===4?new Date(d):new Date(p[2]+'-'+p[1]+'-'+p[0])):new Date(0);}
function sortByDate(arr){return [...arr].sort((a,b)=>parseRegDate(b)-parseRegDate(a));}
function parseDate(d){if(!d)return new Date(0);const p=d.split('-');return p.length===3?(p[0].length===4?new Date(d):new Date(p[2]+'-'+p[1]+'-'+p[0])):new Date(0);}
function cdSince(caseId){const entries=allCD.filter(e=>e.caseId===caseId);if(!entries.length)return null;const dates=entries.map(e=>parseDate(e.date)).filter(d=>!isNaN(d));if(!dates.length)return null;dates.sort((a,b)=>b-a);const now=new Date();now.setHours(0,0,0,0);return Math.floor((now-dates[0])/86400000);}
function cdOverdue(caseId){const d=cdSince(caseId);return d===null||d>=15;}
function toInputDate(d){if(!d)return '';const p=d.split('-');if(p.length===3&&p[0].length===2)return p[2]+'-'+p[1]+'-'+p[0];return d;}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function setSelected(id,val){const el=document.getElementById(id);if(!el)return;for(let i=0;i<el.options.length;i++)el.options[i].selected=el.options[i].value===val;}
function matches(c){if(!srchQ)return true;const q=srchQ.toLowerCase().trim();const fields=[c.firNo,c.head,c.us,c.status,c.compName,c.compMobile,c.compAddress,c.dateOfReg,c.remarks];return fields.some(f=>(f||'').toLowerCase().includes(q));}
function matchesInq(e){if(!srchQ)return true;const q=srchQ.toLowerCase();return Object.values(e).join(' ').toLowerCase().includes(q);}
function getActiveCases(){return allCases.filter(c=>!isCS(c.status));}
function getCSCases(){return allCases.filter(c=>isCS(c.status));}
function getPriorityList(){return allCases.filter(c=>isPinned(c.id)||isJC(c.id));}
function getActiveInquest(){return allInquest.filter(e=>(e.status||'active')==='active');}
function getDisposedInquest(){return allInquest.filter(e=>e.status==='disposed');}

// ══ STATS ══
function updateStats(){
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  if(curModule==='cases'){set('h-p',getPriorityList().length);set('h-a',getActiveCases().length);set('h-c',getCSCases().length);set('h-t',allCases.length);}
  else{set('h-a',getActiveInquest().length);set('h-c',getDisposedInquest().length);set('h-t',allInquest.length);}
}

// ══ STATUS OPTIONS — UPDATED ══
const DEFAULT_STATUSES=['UNDER INVESTIGATION','CHARGESHEETED','CANCELLATION','QUASHED','UNTRACE','FALSE REPORT','CLOSURE','HANDOVER TO MHCR'];

function statusOpts(selectedVal){
  const custom=getCustomStatuses();
  const all=[...DEFAULT_STATUSES,...custom,'+ ADD CUSTOM STATUS'];
  return all.map(o=>'<option value="'+(o==='+ ADD CUSTOM STATUS'?'__custom__':o)+'"'+(selectedVal&&o===selectedVal?' selected':'')+'>'+o+'</option>').join('');
}

window.onStatusChange=function(selectEl,customDivId){
  if(selectEl.value==='__custom__'){
    document.getElementById(customDivId).style.display='block';
    selectEl.value='';
  } else {
    document.getElementById(customDivId).style.display='none';
  }
};

window.addCustomStatus=function(inputId,selectId,customDivId){
  const val=document.getElementById(inputId).value.trim().toUpperCase();
  if(!val){showToast('Status naam likho!',true);return;}
  const custom=getCustomStatuses();
  if(!custom.includes(val)){custom.push(val);saveCustomStatuses(custom);}
  const sel=document.getElementById(selectId);
  const newOpt=document.createElement('option');
  newOpt.value=val;newOpt.textContent=val;
  sel.insertBefore(newOpt,sel.lastElementChild);
  sel.value=val;
  document.getElementById(customDivId).style.display='none';
  document.getElementById(inputId).value='';
  showToast('Status added: '+val);
};

    '<button type="button" onclick="addCustomStatus(\''+idPrefix+'-status-input\',\''+idPrefix+'-status\',\''+idPrefix+'-status-custom\')" style="background:var(--gold);color:#040a14;border:none;padding:8px 12px;border-radius:6px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:11px;cursor:pointer;">Add</button>'+
    '</div></div></div>';

function render(){const el=document.getElementById('content');if(curModule==='cases')renderCases(el);else renderInquest(el);}

function renderCases(el){
  let list=[];
  if(curView==='priority')list=getPriorityList();
  else if(curView==='active')list=getActiveCases();
  else if(curView==='cs')list=getCSCases();
  else list=[...allCases];
  list=sortByDate(list).filter(matches);
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-i">📁</div><p>'+(srchQ?'No results':'No cases found')+'</p></div>';return;}
  el.innerHTML=list.map(buildCaseCard).join('');
}

function renderInquest(el){
  let list=[];
  if(curView==='active')list=getActiveInquest();
  else if(curView==='disposed')list=getDisposedInquest();
  else list=[...allInquest];
  list=list.filter(matchesInq).sort((a,b)=>parseDate(b.date)-parseDate(a.date));
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-i">📋</div><p>'+(srchQ?'No results':'No inquest found')+'</p></div>';return;}
  el.innerHTML=list.map(buildInqCard).join('');
}

// ══ STATUS BADGE ══
function sbadge(status){
  const st=(status||'').toLowerCase();
  if(st.includes('chargesheeted'))return '<span class="badge b-cs">Chargesheeted</span>';
  if(st.includes('handover to mhcr'))return '<span class="badge b-mhcr">Handover MHCR</span>';
  if(st.includes('cancel'))return '<span class="badge b-cancel">Cancellation</span>';
  if(st.includes('quash'))return '<span class="badge b-cancel">Quashed</span>';
  if(st.includes('untrace'))return '<span class="badge b-un">Untrace</span>';
  if(st.includes('closure'))return '<span class="badge b-un">Closure</span>';
  if(st.includes('false'))return '<span class="badge b-un">False Report</span>';
  // custom statuses — show with purple badge
  const custom=getCustomStatuses();
  if(custom.some(cs=>cs.toLowerCase()===st))return '<span class="badge b-cancel">'+status+'</span>';
  return '<span class="badge b-ui">Under Inv.</span>';
}

function ccls(c){
  const st=(c.status||'').toLowerCase();
  if(st.includes('handover to mhcr'))return 'c-mhcr';
  if(st.includes('untrace'))return 'c-un';
  if(st.includes('cancel')||st.includes('quash')||st.includes('closure')||st.includes('false'))return 'c-cancel';
  if(isCS(c.status))return 'c-cs';
  if(isPinned(c.id))return 'c-pin';
  if(isJC(c.id))return 'c-jc';
  return 'c-ui';
}

function calcDaysSince(dateStr){
  if(!dateStr)return '';
  const p=dateStr.split('-');
  const regDate=p[0].length===4?new Date(dateStr):new Date(p[2]+'-'+p[1]+'-'+p[0]);
  if(isNaN(regDate))return '';
  const now=new Date();now.setHours(0,0,0,0);
  const totalDays=Math.floor((now-regDate)/86400000);
  if(totalDays<0)return '0 Days';
  const years=Math.floor(totalDays/365);
  const rem1=totalDays%365;
  const months=Math.floor(rem1/30);
  const days=rem1%30;
  if(totalDays<90)return totalDays+' Day'+(totalDays!==1?'s':'');
  else if(years<1){let s=months+' Month'+(months!==1?'s':'');if(days>0)s+=' '+days+' Day'+(days!==1?'s':'');return s;}
  else{let s=years+' Year'+(years!==1?'s':'');if(months>0)s+=' '+months+' Month'+(months!==1?'s':'');if(days>0)s+=' '+days+' Day'+(days!==1?'s':'');return s;}
}

window.submitCase=async function(){
  const firNo=gv('f-fir'),reg=gv('f-reg');
  if(!firNo||!reg){showToast('FIR No. aur Date zaroori hai!',true);return;}
  const duplicate=allCases.find(c=>(c.firNo||'').trim().toLowerCase()===firNo.trim().toLowerCase());
  if(duplicate){showToast('FIR '+firNo+' pehle se save hai!',true);return;}
  const p=reg.split('-');
  const fmtReg=p[0].length===4?p[2]+'-'+p[1]+'-'+p[0]:reg;
  const today=new Date();today.setHours(0,0,0,0);
  const daysSince=Math.floor((today-new Date(reg))/86400000);
  const blks=document.querySelectorAll('#accCont .acc-blk');

window.saveCD=async function(){
  const date=document.getElementById('cd-date').value;
  const txt=document.getElementById('cd-txt').value.trim();
  if(!date||!txt){showToast('Date aur details zaroori hain!',true);return;}
  const p=date.split('-');
  const fmt=p[0].length===4?p[2]+'-'+p[1]+'-'+p[0]:date;
  const rem=document.getElementById('cd-rem').value.trim();
  // Read from hidden inputs — reliable
  const caseId=document.getElementById('cd-case-id').value;
  const entryId=document.getElementById('cd-entry-id').value;
  if(!caseId){showToast('Case ID missing, please retry',true);return;}
  const btn=document.getElementById('cd-btn');btn.textContent='Saving...';btn.disabled=true;
  try{
    if(entryId){
      await updateDoc(doc(db,psCollName('caseDiary'),entryId),{date:fmt,details:txt,remarks:rem});
      showToast('CD updated!');
    } else {
      await addDoc(collection(db,psCollName('caseDiary')),{caseId,date:fmt,details:txt,remarks:rem,createdAt:new Date().toISOString()});
      showToast('CD saved!');
    }
    closeCD();loadData();
  }catch(e){showToast('Error: '+e.message,true);}
  finally{btn.textContent=entryId?'Update CD Entry':'Save CD Entry';btn.disabled=false;}
};

  const ps=getPSById(getCurPS());
  let list=sortByDate([...allCases]);
  let html=`<html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;font-size:11px;margin:16px;}.header{text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:16px;}.header h1{font-size:18px;font-weight:bold;margin:0;}table{width:100%;border-collapse:collapse;margin-top:8px;}th{background:#1a1a2e;color:#fff;padding:7px 8px;text-align:left;font-size:10px;letter-spacing:.8px;text-transform:uppercase;}td{padding:7px 8px;border-bottom:1px solid #ddd;font-size:11px;vertical-align:top;}tr:nth-child(even){background:#f8f8f8;}.status-active{color:#e67e22;font-weight:bold;}.status-cs{color:#27ae60;font-weight:bold;}.status-jc{color:#e74c3c;font-weight:bold;}.footer{text-align:center;font-size:10px;color:#666;margin-top:16px;border-top:1px solid #ccc;padding-top:8px;}.top-bar{display:flex;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eee;}.top-bar button{padding:8px 20px;border:none;border-radius:5px;font-size:13px;font-weight:bold;cursor:pointer;}.btn-print{background:#d4a017;color:#000;}.btn-close{background:#e74c3c;color:#fff;}@media print{.top-bar{display:none;}body{margin:8px;}}</style></head><body>
  <div class="top-bar"><button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button><button class="btn-close" onclick="window.close()">✕ Close</button></div>
  <div class="header"><h1>${ps.name}</h1><div style="font-size:12px;">${ps.district}</div>
  <div style="font-size:11px;margin-top:4px;">All Cases — Total: ${list.length} | Active: ${getActiveCases().length} | CS Filed: ${getCSCases().length}</div>
  <div style="font-size:10px;color:#666;margin-top:4px;">Printed on ${new Date().toLocaleDateString('en-IN')}</div></div>
  <table><tr><th>#</th><th>FIR No.</th><th>Date of Reg.</th><th>Head</th><th>U/S</th><th>Status</th><th>Complainant</th><th>Accused</th></tr>`;
  list.forEach((c,i)=>{
    const accList=allAccused.filter(a=>a.caseId===c.id);
    const accNames=accList.map(a=>a.fullName).join(', ');
    const hasJC=accList.some(a=>(a.custodyStatus||'').toLowerCase().includes('jc'));
    const statusClass=isCS(c.status)?'status-cs':(hasJC?'status-jc':'status-active');
    html+=`<tr><td>${i+1}</td><td><strong>${c.firNo||'-'}</strong>${hasJC?'<br><span style="color:red;font-size:9px;">JC</span>':''}</td><td>${c.dateOfReg||'-'}</td><td>${c.head||'-'}</td><td style="font-size:10px;">${c.us||'-'}</td><td class="${statusClass}">${c.status||'-'}</td><td>${c.compName||'-'}</td><td style="font-size:10px;">${accNames||'-'}</td></tr>`;
  });
  html+=`</table><div class="footer">Generated by Case Tracker App — ${ps.name}, ${ps.district}</div></body></html>`;
  const win=window.open('','_blank');win.document.write(html);win.document.close();setTimeout(()=>win.print(),500);
};

// ══ UI HELPERS ══
function showLoading(){document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div><p>Loading...</p></div>';}
function showErr(msg){document.getElementById('content').innerHTML='<div class="err-box">Error: '+msg+'<br><br><button onclick="loadData()" style="background:var(--gold);color:#040a14;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px">Retry</button></div>';}
function showToast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(isErr?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3000);}

// ══ INIT ══
window.onload=function(){
  initPS();
  const ps=getPSById(getCurPS());
  document.getElementById('topbar-ps').textContent=ps.name;
  updateReadonlyBanner();
  loadData();
};

['addOv','editOv','cdOv','inqOv','psOv'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
});
</script>
